{% extends 'base.html' %}
{% block title %}Confirm Delete{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card gh-card">
            <div class="card-body p-4 text-center">
                <i class="bi bi-exclamation-triangle text-warning" style="font-size:3rem"></i>
                <h4 class="mt-3">Delete Alert Rule?</h4>
                <p>Are you sure you want to delete: <strong>{{ rule }}</strong>?</p>
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">Yes, Delete</button>
                    <a href="{% url 'alerts:alert_list' %}" class="btn btn-outline-secondary ms-2">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
